version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: court_booking_db
    environment:
      POSTGRES_USER: courtbooking
      POSTGRES_PASSWORD: courtbooking123
      POSTGRES_DB: court_booking
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - court_booking_network

  redis:
    image: redis:7-alpine
    container_name: court_booking_redis
    ports:
      - "6379:6379"
    networks:
      - court_booking_network

  adminer:
    image: adminer:latest
    container_name: court_booking_adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - court_booking_network

volumes:
  postgres_data:

networks:
  court_booking_network:
    driver: bridge